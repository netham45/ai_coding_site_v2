schema_version: 1
inventory_id: relevant_user_flow_inventory
purpose: >-
  Track the currently relevant canonical user and operator runtime flows in a
  machine-validated note asset so implementation work updates flow relevance,
  affected systems, and proof surfaces without creating a second prose-only
  flow registry.
interpretation_rules:
  - flows/*.md remain the canonical narrative runtime flow contracts
  - this YAML inventory is the authoritative structured tracking surface under notes/
  - simulation-derived flows and blueprint assets belong in flows/*.yaml and related traceability notes unless explicitly promoted into this inventory
  - bounded proof status and real E2E completion must remain distinct
flows:
