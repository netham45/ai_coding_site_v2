    title: Create Top-Level Node
    canonical_md: flows/01_create_top_level_node_flow.md
    summary: Create durable top-level work from a prompt and compile its first workflow.
    relevance:
      status: active
      rationale: Primary product entrypoint and the root of most runtime narratives.
      discovered_from:
        - notes/scenarios/journeys/common_user_journeys_analysis.md
        - notes/planning/implementation/scenario_and_flow_pytest_plan.md
    scope:
      database: affected
      cli: affected
      daemon: affected
      website_ui: affected
      yaml: affected
      prompts: affected
      user_documentation: affected
    documentation:
      required: true
      surfaces:
        - docs/README.md
        - docs/user/getting-started.md
        - docs/operator/first-live-run.md
    invariants:
      - created nodes, prompts, and compiled workflows must be durably inspectable
      - top-level creation must not rely on hidden session state
    canonical_commands:
      bounded:
        - python3 -m pytest tests/integration/test_flow_contract_suite.py::test_flow_contract_cases[01] -q
      e2e:
        - python3 -m pytest tests/e2e/test_flow_01_create_top_level_node_real.py -q
      docs:
        - python3 -m pytest tests/unit/test_relevant_user_flow_inventory.py tests/unit/test_document_schema_docs.py tests/unit/test_notes_quickstart_docs.py -q
    proof:
      bounded_status: partial
      real_e2e_status: partial
      primary_e2e_target: tests/e2e/test_flow_01_create_top_level_node_real.py
    related_notes:
      - notes/catalogs/audit/flow_coverage_checklist.md
      - notes/planning/implementation/scenario_and_flow_pytest_plan.md
    change_triggers:
      - top-level node-kind policy changes
