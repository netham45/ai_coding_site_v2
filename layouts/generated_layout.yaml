kind: layout_definition
id: real_e2e_flow_22_parent_layout
name: Real E2E Flow 22 Parent Layout
description: Two sibling phases with a strict prerequisite dependency from the second phase to the first.
children:
  - id: prerequisite_lane
    kind: phase
    tier: 1
    name: Prerequisite Lane
    goal: Complete the prerequisite work required before the dependent lane can begin.
    rationale: The user requested the first sibling to be the prerequisite lane and to keep the layout minimal.
    dependencies: []
    acceptance:
      - The prerequisite lane defines and delivers the prerequisite work needed by the dependent sibling.
      - The prerequisite lane can complete independently without relying on the second sibling.
    ordinal: 1
  - id: blocked_dependent_lane
    kind: phase
    tier: 1
    name: Blocked Dependent Lane
    goal: Perform the dependent work only after the prerequisite lane completes through a live tmux session.
    rationale: The second sibling must remain blocked on the first until the first completes, preserving the requested dependency shape.
    dependencies:
      - prerequisite_lane
    acceptance:
      - The dependent lane remains blocked until the prerequisite lane is completed through a live tmux session.
      - The dependent lane starts only after the prerequisite lane finishes successfully.
    ordinal: 2
