kind: workflow_profile_definition
id: phase.e2e
name: E2E Phase
description: Prove the intended flow through the real runtime boundaries and capture the resulting status honestly.
applies_to_kind: phase
profile_family: phase
status: draft
main_prompt_ref: prompts/sub_epic/e2e.md
default_child_layout: layouts/phase_e2e_to_plans.yaml
compatible_layouts:
  - layouts/phase_e2e_to_plans.yaml
layout_tags:
  - e2e
  - hardening
  - runtime_proof
child_generation:
  allowed_child_kinds: [plan]
  required_child_roles:
    - execution
    - verification
    - remediation
  allow_extra_roles: true
  min_children: 2
  max_children: 6
  balance_strategy: estimated_points
  max_point_skew_percent: 40
child_profile_defaults:
  execution: plan.execution
  verification: plan.verification
  remediation: plan.authoring
compiled_subtask_template:
  chain_family: non_leaf_decomposition
  child_target_kind: plan
  ordered_steps:
    - load_workflow_brief
    - review_required_child_roles
    - compose_plan_layout
    - validate_role_coverage
    - materialize_plan_children
    - confirm_child_spawn_summary
    - wait_for_children
    - merge_children
    - publish_parent_summary
  blocked_transitions:
    - action: complete
      code: children_required_before_completion
      message: you did not spawn children before attempting merge or completion
  completion_predicates:
    - execution, verification, and remediation child roles exist
    - plan children were materialized from the accepted layout
    - merged child outputs are available for parent closure
    - parent summary was published
required_repository_updates:
  - checklist
  - development_log
  - e2e_mapping
required_verification:
  - real_e2e
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - complete
    - flow_complete
    - release_ready
brief_generation:
  require_compiler_generated_brief: true
  brief_prompt_ref: prompts/sub_epic/global_brief.md
  include_node_tier_prompt: true
  include_profile_prompt: true
  include_recommended_child_profiles: true
  include_cli_discovery_note: true
metadata:
  intent: real_runtime_proof
  maturity: starter_builtin
