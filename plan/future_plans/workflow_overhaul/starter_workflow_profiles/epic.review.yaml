kind: workflow_profile_definition
id: epic.review
name: Review Epic
description: Inspect an existing system, remediate issues, and confirm the remediation.
applies_to_kind: epic
profile_family: epic
status: draft
main_prompt_ref: prompts/epic/review.md
default_child_layout: layouts/epic_review_to_phases.yaml
compatible_layouts:
  - layouts/epic_review_to_phases.yaml
layout_tags:
  - review
  - remediation
  - re_review
child_generation:
  allowed_child_kinds: [phase]
  required_child_roles:
    - scope_freeze
    - review
    - remediation
    - re_review
  allow_extra_roles: false
  min_children: 4
  max_children: 6
  balance_strategy: estimated_points
  max_point_skew_percent: 25
child_profile_defaults:
  scope_freeze: phase.discovery
  review: phase.review
  remediation: phase.remediation
  re_review: phase.review
required_repository_updates:
  - notes
  - checklist
  - development_log
required_verification:
  - bounded_tests
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - flow_complete
    - release_ready
brief_generation:
  require_compiler_generated_brief: true
  brief_prompt_ref: prompts/epic/global_brief.md
metadata:
  intent: review_and_remediation
  maturity: starter_builtin
