kind: workflow_profile_definition
id: epic.documentation
name: Documentation Epic
description: Inventory, author, verify, and repair authoritative docs.
applies_to_kind: epic
profile_family: epic
status: draft
main_prompt_ref: prompts/epic/documentation.md
default_child_layout: layouts/epic_documentation_to_phases.yaml
compatible_layouts:
  - layouts/epic_documentation_to_phases.yaml
layout_tags:
  - documentation
  - inventory
  - remediation
child_generation:
  allowed_child_kinds: [phase]
  required_child_roles:
    - inventory
    - authoring
    - verification
    - remediation
  allow_extra_roles: true
  min_children: 4
  max_children: 6
  balance_strategy: estimated_points
  max_point_skew_percent: 25
child_profile_defaults:
  inventory: phase.discovery
  authoring: phase.documentation
  verification: phase.documentation
  remediation: phase.remediation
compiled_subtask_template:
  chain_family: non_leaf_decomposition
  child_target_kind: phase
  ordered_steps:
    - load_workflow_brief
    - review_required_child_roles
    - compose_phase_layout
    - validate_role_coverage
    - materialize_phase_children
    - confirm_child_spawn_summary
    - wait_for_children
    - merge_children
    - publish_parent_summary
  blocked_transitions:
    - action: complete
      code: children_required_before_completion
      message: you did not spawn children before attempting merge or completion
  completion_predicates:
    - inventory, authoring, verification, and remediation child roles exist
    - phase children were materialized from the accepted layout
    - merged child outputs are available for documentation closure
    - parent summary was published
required_repository_updates:
  - notes
  - checklist
  - development_log
required_verification:
  - document_schema
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - complete
    - flow_complete
    - release_ready
brief_generation:
  require_compiler_generated_brief: true
  brief_prompt_ref: prompts/epic/global_brief.md
metadata:
  intent: documentation_alignment
  maturity: starter_builtin
