kind: workflow_profile_definition
id: task.implementation
name: Implementation Task
description: Change repository behavior or shipped assets for one bounded execution slice.
applies_to_kind: task
profile_family: task
status: draft
main_prompt_ref: prompts/task/implementation.md
compiled_subtask_template:
  chain_family: leaf_execution
  ordered_steps:
    - load_task_context
    - inspect_current_state
    - edit_owned_artifacts
    - run_declared_verification
    - register_outputs_and_summary
    - validate_completion_predicates
    - complete_or_block
  blocked_transitions:
    - action: complete
      code: completion_predicates_not_met
      message: declared implementation outputs or proof are still missing
  completion_predicates:
    - owned artifacts were edited or the no-change result was recorded honestly
    - declared bounded verification ran
    - outputs and summary were durably written
required_repository_updates:
  - checklist
  - development_log
required_verification:
  - bounded_tests
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - flow_complete
    - release_ready
metadata:
  intent: implementation
  maturity: starter_builtin
