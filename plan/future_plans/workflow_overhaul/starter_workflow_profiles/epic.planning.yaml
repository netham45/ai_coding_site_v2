kind: workflow_profile_definition
id: epic.planning
name: Planning Epic
description: Turn rough intent into explicit requirements, architecture, and verification mapping.
applies_to_kind: epic
profile_family: epic
status: draft
main_prompt_ref: prompts/epic/planning.md
default_child_layout: layouts/epic_planning_to_phases.yaml
compatible_layouts:
  - layouts/epic_planning_to_phases.yaml
layout_tags:
  - planning
  - architecture
  - verification_mapping
child_generation:
  allowed_child_kinds: [phase]
  required_child_roles:
    - requirements
    - architecture
    - planning
    - verification_mapping
  allow_extra_roles: true
  min_children: 4
  max_children: 8
  balance_strategy: estimated_points
  max_point_skew_percent: 30
child_profile_defaults:
  requirements: phase.discovery
  architecture: phase.discovery
  planning: phase.documentation
  verification_mapping: phase.documentation
compiled_subtask_template:
  chain_family: non_leaf_decomposition
  child_target_kind: phase
  ordered_steps:
    - load_workflow_brief
    - review_required_child_roles
    - compose_phase_layout
    - validate_role_coverage
    - materialize_phase_children
    - confirm_child_spawn_summary
    - wait_for_children
    - merge_children
    - publish_parent_summary
  blocked_transitions:
    - action: complete
      code: children_required_before_completion
      message: you did not spawn children before attempting merge or completion
  completion_predicates:
    - requirements, architecture, planning, and verification_mapping child roles exist
    - phase children were materialized from the accepted layout
    - merged child outputs are available for parent closure
    - parent summary was published
required_repository_updates:
  - notes
  - plan
  - checklist
  - development_log
required_verification:
  - document_schema
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - complete
    - flow_complete
    - release_ready
brief_generation:
  require_compiler_generated_brief: true
  brief_prompt_ref: prompts/epic/global_brief.md
metadata:
  intent: planning
  maturity: starter_builtin
