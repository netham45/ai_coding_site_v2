kind: workflow_profile_definition
id: phase.review
name: Review Phase
description: Inspect a defined scope, gather evidence, and leave remediation-ready findings.
applies_to_kind: phase
profile_family: phase
status: draft
main_prompt_ref: prompts/sub_epic/review.md
default_child_layout: layouts/phase_review_to_plans.yaml
compatible_layouts:
  - layouts/phase_review_to_plans.yaml
layout_tags:
  - review
  - evidence
  - findings
child_generation:
  allowed_child_kinds: [plan]
  required_child_roles:
    - evidence
    - findings
    - handoff
  allow_extra_roles: true
  min_children: 2
  max_children: 5
  balance_strategy: estimated_points
  max_point_skew_percent: 35
child_profile_defaults:
  evidence: plan.verification
  findings: plan.authoring
  handoff: plan.authoring
required_repository_updates:
  - notes
  - checklist
  - development_log
required_verification:
  - bounded_tests
completion_restrictions:
  forbidden_statuses_until_requirements_met:
    - complete
    - flow_complete
    - release_ready
brief_generation:
  require_compiler_generated_brief: true
  brief_prompt_ref: prompts/sub_epic/global_brief.md
  include_node_tier_prompt: true
  include_profile_prompt: true
  include_recommended_child_profiles: true
  include_cli_discovery_note: true
metadata:
  intent: review
  maturity: starter_builtin
