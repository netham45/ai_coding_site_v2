kind: task_definition
id: research_context
name: Research Context
description: Build the minimum context bundle needed before planning or implementation proceeds.
applies_to_kinds:
  - epic
  - phase
  - plan
policy:
  max_subtask_retries: 2
  on_failure: pause_for_user
uses_reviews: []
uses_testing: []
uses_docs: []
subtasks:
  - kind: subtask_definition
    id: build_context
    type: build_context
    title: Build Context Bundle
    description: Gather current requirements, repository context, and prior summaries.
    prompt: "prompts/runtime/cli_bootstrap.md"
    retry_policy: {max_attempts: 2, backoff_seconds: 5}
    on_failure: {action: pause_for_user}
  - kind: subtask_definition
    id: summarize_research_context
    type: write_summary
    title: Summarize Research Context
    description: Write a durable context summary for downstream stages.
    requires: [{subtask_complete: build_context}]
    prompt: "prompts/runtime/missing_required_output.md"
    outputs: [{type: summary_written, path: summaries/research_context.md}]
    retry_policy: {max_attempts: 2, backoff_seconds: 5}
    on_failure: {action: pause_for_user}
