kind: testing_definition
id: default_smoke_test_gate
name: Default Smoke Test Gate
applies_to:
  node_kinds: [task, plan]
  task_ids: [test_node]
  lifecycle_points: [after_task]
scope: smoke
description: Run a small smoke test suite.
commands:
  - command: python3 -m pytest tests/unit/test_cli.py -q
    working_directory: .
    env: {}
retry_policy: {max_attempts: 1, rerun_failed_only: false}
pass_rules: {require_exit_code_zero: true, max_failed_tests: 0}
on_result: {pass_action: continue, fail_action: fail_to_parent}
