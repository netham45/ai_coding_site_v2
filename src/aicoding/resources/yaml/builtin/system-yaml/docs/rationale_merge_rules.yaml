kind: docs_definition
id: rationale_merge_rules
name: Rationale Merge Rules
applies_to:
  node_kinds: [phase, plan]
  task_ids: [reconcile_children]
  lifecycle_points: [after_task]
scope: rationale_view
description: Build the rationale-merge documentation view.
inputs:
  include_static_analysis: false
  include_entity_relations: false
  include_node_summaries: true
